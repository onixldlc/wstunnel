name: Build and Push Docker Image (Custom)

on:
  push:
    branches: [main]
    paths:
      - 'wstunnel/**'
      - 'wstunnel-cli/**'
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Base version override (e.g., 10.5.2). Leave empty to auto-detect from Cargo.toml.'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          # Step 1: Determine base version
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            BASE_VERSION="${{ github.event.inputs.version }}"
            echo "Using manually provided version: $BASE_VERSION"
          else
            BASE_VERSION=$(grep -oP '(?<=^version = ")[^"]+' wstunnel/Cargo.toml | head -1)
            echo "Auto-detected version from Cargo.toml: $BASE_VERSION"
          fi

          if [[ -z "$BASE_VERSION" ]]; then
            echo "::error::Could not determine base version from Cargo.toml or input."
            exit 1
          fi

          # Step 2: Find the highest revision already pushed for this exact base version
          TAGS=$(skopeo list-tags docker://ghcr.io/${{ github.repository }} 2>/dev/null | jq -r '.Tags[]?' || echo "")

          echo "All tags found:"
          echo "$TAGS"

          HIGHEST_REV=0
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            if [[ $tag =~ ^${BASE_VERSION}r([0-9]+)$ ]]; then
              REV=${BASH_REMATCH[1]}
              echo "  Matched: $tag  (r$REV)"
              if [[ $REV -gt $HIGHEST_REV ]]; then
                HIGHEST_REV=$REV
              fi
            fi
          done <<< "$TAGS"

          # Step 3: Next revision = highest + 1 (per-version; restarts at r1 on new version)
          NEXT_REV=$((HIGHEST_REV + 1))
          NEW_VERSION="${BASE_VERSION}r${NEXT_REV}"

          echo "========================================"
          echo "Base version : $BASE_VERSION"
          echo "Previous rev : r${HIGHEST_REV} (0 = first build for this version)"
          echo "Next version : $NEW_VERSION"
          echo "========================================"

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

  build-and-push:
    runs-on: ubuntu-latest
    needs: determine-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.determine-version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ needs.determine-version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | \`${{ needs.determine-version.outputs.version }}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY
